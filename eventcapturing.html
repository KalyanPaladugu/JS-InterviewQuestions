<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
       <div id="grandparent" style="padding: 30px; background: #ffcccc;">
  Grandparent
  <div id="parent" style="padding: 30px; background: #ccffcc;">
    Parent
    <div id="child" style="padding: 30px; background: #ccccff;">
      Child (Click Me)
    </div>
  </div>
</div>

    <script>
        const gp = document.querySelector('#grandparent');
const p = document.querySelector('#parent');
const c = document.querySelector('#child');

// Enable capturing with 'true'
gp.addEventListener('click', () => console.log("Grandparent Capturing"), true);
p.addEventListener('click', () => console.log("Parent Capturing"), true);
c.addEventListener('click', () => console.log("Child Capturing"), true);

// Click the Child:
// Output: 
// 1. Grandparent Capturing
// 2. Parent Capturing
// 3. Child Capturing
    </script>
</body>
</html>
